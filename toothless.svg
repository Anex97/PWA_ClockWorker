<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <!-- Fondo (transparente) -->
  <rect width="300" height="300" fill="none"/>
  
  <!-- Cola -->
  <path d="M 160 220 Q 180 260 160 300" stroke="#1a1a1a" stroke-width="15" fill="none" stroke-linecap="round"/>
  
  <!-- Alas izquierdas -->
  <path d="M 100 150 Q 60 120 50 160" stroke="#2a2a2a" stroke-width="14" fill="none" stroke-linecap="round"/>
  <path d="M 95 160 Q 55 145 40 190" stroke="#2a2a2a" stroke-width="12" fill="none" stroke-linecap="round"/>
  
  <!-- Alas derechas -->
  <path d="M 200 150 Q 240 120 250 160" stroke="#2a2a2a" stroke-width="14" fill="none" stroke-linecap="round"/>
  <path d="M 205 160 Q 245 145 260 190" stroke="#2a2a2a" stroke-width="12" fill="none" stroke-linecap="round"/>
  
  <!-- Cuerpo principal -->
  <ellipse cx="150" cy="170" rx="70" ry="60" fill="#1a1a1a" stroke="#0a0a0a" stroke-width="2"/>
  
  <!-- Cuello -->
  <rect x="130" y="110" width="40" height="50" fill="#1a1a1a" rx="5"/>
  
  <!-- Cabeza -->
  <ellipse cx="150" cy="80" rx="55" ry="50" fill="#1a1a1a" stroke="#0a0a0a" stroke-width="2"/>
  
  <!-- Mandíbula inferior -->
  <path d="M 110 95 Q 150 110 190 95" stroke="#0a0a0a" stroke-width="3" fill="none" stroke-linecap="round"/>
  
  <!-- Orejas izquierda -->
  <path d="M 115 40 L 105 10 L 120 35 Z" fill="#1a1a1a" stroke="#0a0a0a" stroke-width="1"/>
  
  <!-- Orejas derecha -->
  <path d="M 185 40 L 195 10 L 180 35 Z" fill="#1a1a1a" stroke="#0a0a0a" stroke-width="1"/>
  
  <!-- Cuernos pequeños -->
  <line x1="130" y1="25" x2="125" y2="5" stroke="#0a0a0a" stroke-width="2" stroke-linecap="round"/>
  <line x1="170" y1="25" x2="175" y2="5" stroke="#0a0a0a" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Ojo izquierdo - blanco -->
  <ellipse cx="125" cy="70" rx="12" ry="15" fill="#ffc800"/>
  
  <!-- Ojo izquierdo - pupila -->
  <circle cx="127" cy="73" r="7" fill="#000"/>
  
  <!-- Ojo izquierdo - brillo -->
  <circle cx="129" cy="70" r="3" fill="#fff"/>
  
  <!-- Ojo derecho - blanco -->
  <ellipse cx="175" cy="70" rx="12" ry="15" fill="#ffc800"/>
  
  <!-- Ojo derecho - pupila -->
  <circle cx="173" cy="73" r="7" fill="#000"/>
  
  <!-- Ojo derecho - brillo -->
  <circle cx="171" cy="70" r="3" fill="#fff"/>
  
  <!-- Nariz -->
  <path d="M 150 85 L 145 95 L 155 95 Z" fill="#000"/>
  
  <!-- Boca/Dientes -->
  <line x1="135" y1="100" x2="165" y2="100" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Dientes individuo -->
  <line x1="140" y1="100" x2="138" y2="108" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="150" y1="100" x2="150" y2="108" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="160" y1="100" x2="162" y2="108" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
  
  <!-- Puntas de fuego (opcional, efecto de fuego nocturno) -->
  <circle cx="130" cy="55" r="3" fill="#ff6600" opacity="0.6"/>
  <circle cx="170" cy="55" r="3" fill="#ff6600" opacity="0.6"/>
  
  <!-- Garras delanteras izquierdas -->
  <circle cx="110" cy="215" r="5" fill="#1a1a1a"/>
  <circle cx="125" cy="225" r="5" fill="#1a1a1a"/>
  
  <!-- Garras delanteras derechas -->
  <circle cx="190" cy="215" r="5" fill="#1a1a1a"/>
  <circle cx="175" cy="225" r="5" fill="#1a1a1a"/>
</svg>
